<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>아기사자 명단</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🦁 아기사자 명단 🦁</h1>

    <div class="form-box">

      <input id="lionName" placeholder="이름 입력" />

      <select id="lionPart">
        <option value="Frontend">
          Frontend
        </option>
        <option value="Backend">
          Backend
        </option>
        <option value="Design">
          Design
        </option>
      </select>

      <button id="addBtn">
        🦁 추가하기 🦁
      </button>

      <button id="firstLionBtn">
        👑 첫 번째 아기사자 보기 👑
      </button>

      <button id="errorTestBtn">
        🔍 타입 안전성 확인 🔍
      </button>

    </div>

    <h2>등록된 아기사자</h2>

    <ul id="lionList"></ul>

  </div>
  <script src="script.js"></script>

</body>

</html>
